<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening App...</title>
    <script>
        const repoName = window.location.pathname.split('/')[1]; 
        const rawTargetUrl = window.location.href.split(repoName + '/')[1];

        if (rawTargetUrl) {
            let targetUrl = decodeURIComponent(rawTargetUrl);
            if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
                targetUrl = 'https://' + targetUrl;
            }

            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isAndroid = /android/i.test(userAgent);
            const isIOS = /iPad|iPhone|iPod/.test(userAgent);

            // 1. ADVANCED BYPASS FOR ANDROID IN INDIA
            if (isAndroid) {
                if (targetUrl.includes('amazon') || targetUrl.includes('amzn.to')) {
                    // Extract the clean URL without protocol
                    let cleanUrl = targetUrl.replace('https://', '').replace('http://', '');
                    
                    // CRITICAL FIX: Directing specifically to the Indian Amazon App Package
                    window.location.href = `intent://${cleanUrl}#Intent;scheme=https;package=in.amazon.mShop.android.shopping;end;`;
                } else {
                    // General Link: Open cleanly in native Google Chrome to avoid Meta sandbox
                    let cleanUrl = targetUrl.replace('https://', '').replace('http://', '');
                    window.location.href = `intent://${cleanUrl}#Intent;scheme=https;package=com.android.chrome;end;`;
                }
            } 
            
            // 2. BYPASS FOR iOS (iPhone)
            else if (isIOS) {
                if (targetUrl.includes('amazon') || targetUrl.includes('amzn.to')) {
                    // Force jump into iOS app structure
                    window.location.href = targetUrl.replace('https://', 'com.amazon.mobile.shopping.web://').replace('http://', 'com.amazon.mobile.shopping.web://');
                } else {
                    // Open in iOS Google Chrome
                    window.location.href = targetUrl.replace('https://', 'googlechrome://').replace('http://', 'googlechrome://');
                }
            } 
            
            // 3. DESKTOP / OTHER FALLBACK
            else {
                window.location.href = targetUrl;
            }

            // Universal Safety Timer: If the user doesn't have the app installed, send to browser after 600ms
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 600);

        } else {
            window.location.href = "https://www.amazon.in";
        }
    </script>
</head>
<body style="margin: 0; background-color: #f7f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif;">
    <div style="text-align: center; color: #333;">
        <p style="font-size: 18px; font-weight: 500; margin-bottom: 8px;">Directing to Amazon App...</p>
        <p style="font-size: 14px; color: #666; margin: 0;">Please wait a moment.</p>
    </div>
</body>
</html>
